<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MRT Meetup Finder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #252a35;
    --accent: #e8ff6b;
    --accent2: #6bffd4;
    --accent3: #ff6b9d;
    --text: #e8eaf0;
    --muted: #5a6070;
    --card: #1a1e28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,107,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,107,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.75rem;
    font-size: 0.78rem;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.7;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 780px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .panel-title {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .friends-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.2rem;
  }

  .friend-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .friend-badge {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 500;
    flex-shrink: 0;
    border: 1.5px solid;
  }

  .friend-input-wrap {
    position: relative;
    flex: 1;
  }

  .friend-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.55rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .friend-input:focus {
    border-color: var(--accent);
  }

  .friend-input::placeholder { color: var(--muted); }

  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #1e2330;
    border: 1px solid var(--border);
    border-radius: 7px;
    z-index: 1000;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }

  .autocomplete-list.open { display: block; }

  .autocomplete-item {
    padding: 0.5rem 0.8rem;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .autocomplete-item:hover, .autocomplete-item.selected {
    background: rgba(232,255,107,0.1);
    color: var(--accent);
  }

  .btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  #map {
    width: 100%;
    height: 420px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .result-panel {
    display: none;
  }

  .result-panel.visible { display: block; }

  .result-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .result-station {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .result-meta {
    font-size: 0.68rem;
    color: var(--muted);
  }

  .breakdown-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.75rem;
  }

  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    position: relative;
    overflow: hidden;
  }

  .breakdown-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .breakdown-friend {
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .breakdown-from {
    font-size: 0.75rem;
    color: var(--text);
    margin-bottom: 0.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .breakdown-stops {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }

  .breakdown-label {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .bar-wrap {
    margin-top: 0.6rem;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .score-row {
    display: flex;
    gap: 1.5rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .score-item { }
  .score-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .score-value { font-family: 'Fraunces', serif; font-size: 1.2rem; color: var(--accent2); }

  .remove-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
    line-height: 1;
    padding: 0;
  }
  .remove-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  .btn-secondary {
    width: 100%;
    padding: 0.6rem;
    background: transparent;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 0.75rem;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

  .error-msg {
    font-size: 0.75rem;
    color: var(--accent3);
    margin-top: 0.5rem;
    min-height: 1rem;
  }

  .loading {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 2rem;
    display: none;
  }

  /* Leaflet custom markers */
  .friend-marker {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  .meet-marker {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 50%;
    border: 3px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">Singapore MRT</div>
    <h1>Find the <em>fairest</em><br>meetup station.</h1>
    <p class="subtitle">Enter each friend's MRT station. We'll find the stop where no one travels more than necessary — minimizing the longest journey.</p>
  </header>

  <div class="layout">
    <!-- Left: Input Panel -->
    <div class="panel">
      <div class="panel-title">Friends' Stations</div>
      <div class="friends-list" id="friendsList"></div>
      <button class="btn-secondary" id="addFriendBtn" onclick="addFriendRow()">+ Add Friend</button>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn" id="findBtn" onclick="findMeetup()">Find Meetup Station →</button>
    </div>

    <!-- Right: Map + Results -->
    <div class="right-panel">
      <div id="map"></div>
      <div class="loading" id="loading">Computing shortest paths…</div>
      <div class="panel result-panel" id="resultPanel">
        <div class="panel-title">Recommended Meetup</div>
        <div class="result-header">
          <div class="result-station" id="resultStation">—</div>
          <div class="result-meta" id="resultMeta"></div>
        </div>
        <div class="breakdown-grid" id="breakdownGrid"></div>
        <div class="score-row" id="scoreRow"></div>
      </div>
    </div>
  </div>
</div>

const ALL_STATION_NAMES = Object.keys(STATIONS).sort();

// ─── BFS ─────────────────────────────────────────────────────────────────
function bfs(start) {
  const dist = {};
  const queue = [start];
  dist[start] = 0;
  while (queue.length) {
    const curr = queue.shift();
    const neighbors = EDGES[curr] || [];
    for (const nb of neighbors) {
      if (dist[nb] === undefined) {
        dist[nb] = dist[curr] + 1;
        queue.push(nb);
      }
    }
  }
  return dist;
}

// ─── FIND BEST MEETUP ────────────────────────────────────────────────────
function findBestMeetup(friendStations) {
  // Run BFS from each friend
  const allDists = friendStations.map(s => bfs(s));

  let best = null;
  let bestScore = Infinity;

  for (const candidate of ALL_STATION_NAMES) {
    const stops = allDists.map(d => d[candidate]);
    if (stops.some(s => s === undefined)) continue; // unreachable

    const maxStops = Math.max(...stops);
    const variance = stops.reduce((acc, s) => acc + Math.pow(s - stops.reduce((a,b)=>a+b,0)/stops.length, 2), 0) / stops.length;
    // Primary: minimize max stops. Tiebreak: minimize variance
    const score = maxStops * 1000 + variance;

    if (score < bestScore) {
      bestScore = score;
      best = { station: candidate, stops, maxStops, variance };
    }
  }
  return best;
}

function drawLines(friendStations, meetStation) {
  const meetInfo = STATIONS[meetStation];
  if (!meetInfo) return;
  friendStations.forEach((s, i) => {
    const info = STATIONS[s];
    if (!info) return;
    const c = FRIEND_COLORS[i % FRIEND_COLORS.length];
    const line = L.polyline(
      [[info.lat, info.lng], [meetInfo.lat, meetInfo.lng]],
      { color: c.bg, weight: 2, opacity: 0.5, dashArray: '6,6' }
    ).addTo(map);
    polylines.push(line);
  });
}

// ─── AUTOCOMPLETE ────────────────────────────────────────────────────────
let activeListIdx = -1;
let currentList = null;

function setupAutocomplete(input, listEl) {
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    listEl.innerHTML = '';
    activeListIdx = -1;
    if (!q) { listEl.classList.remove('open'); return; }
    const matches = ALL_STATION_NAMES.filter(s => s.toLowerCase().includes(q)).slice(0, 8);
    if (!matches.length) { listEl.classList.remove('open'); return; }
    matches.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.textContent = s;
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = s;
        listEl.classList.remove('open');
      });
      listEl.appendChild(item);
    });
    listEl.classList.add('open');
    currentList = listEl;
  });
  input.addEventListener('keydown', (e) => {
    const items = listEl.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      activeListIdx = Math.min(activeListIdx + 1, items.length - 1);
    } else if (e.key === 'ArrowUp') {
      activeListIdx = Math.max(activeListIdx - 1, -1);
    } else if (e.key === 'Enter') {
      if (activeListIdx >= 0 && items[activeListIdx]) {
        input.value = items[activeListIdx].textContent;
        listEl.classList.remove('open');
      }
      return;
    } else if (e.key === 'Escape') {
      listEl.classList.remove('open');
      return;
    }
    items.forEach((el, i) => el.classList.toggle('selected', i === activeListIdx));
  });
  input.addEventListener('blur', () => setTimeout(() => listEl.classList.remove('open'), 150));
}

const MIN_FRIENDS = 2;
const MAX_FRIENDS = 10;

function renumberRows() {
  const rows = document.querySelectorAll('#friendsList .friend-row');
  rows.forEach((row, i) => {
    const c = FRIEND_COLORS[i % FRIEND_COLORS.length];

function addFriendRow() {
  const list = document.getElementById('friendsList');
  const i = friendInputs.length;
  const c = FRIEND_COLORS[i % FRIEND_COLORS.length];

  const row = document.createElement('div');
  row.className = 'friend-row';

  const badge = document.createElement('div');
  badge.className = 'friend-badge';
  badge.style.background = c.bg + '22';
  badge.style.borderColor = c.bg;
  badge.style.color = c.bg;
  badge.textContent = i + 1;

  const wrap = document.createElement('div');
  wrap.className = 'friend-input-wrap';

  const input = document.createElement('input');
  input.className = 'friend-input';
  input.type = 'text';
  input.placeholder = `Friend ${i+1}'s MRT station…`;
  input.autocomplete = 'off';

  const dropdown = document.createElement('div');
  dropdown.className = 'autocomplete-list';

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-btn';
  removeBtn.innerHTML = '×';
  removeBtn.title = 'Remove friend';
  removeBtn.addEventListener('click', () => {
    const idx = friendInputs.indexOf(input);
    if (idx !== -1) friendInputs.splice(idx, 1);
    list.removeChild(row);
    renumberRows();
  });

  wrap.appendChild(input);
  wrap.appendChild(dropdown);
  row.appendChild(badge);
  row.appendChild(wrap);
  row.appendChild(removeBtn);
  list.appendChild(row);

  setupAutocomplete(input, dropdown);
  friendInputs.push(input);
  renumberRows();
}

function buildFriendRows() {
  for (let i = 0; i < MIN_FRIENDS; i++) addFriendRow();
}

buildFriendRows();

// ─── MAIN LOGIC ──────────────────────────────────────────────────────────
function findMeetup() {
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = '';

  const values = friendInputs.map(i => i.value.trim()).filter(v => v !== '');
  if (values.length < 2) {
    errorEl.textContent = 'Please enter at least 2 stations.';
    return;
  }
  const invalid = values.filter(v => !STATIONS[v]);
  if (invalid.length) {
    errorEl.textContent = `Unknown station(s): ${invalid.join(', ')}`;
    return;
  }
  if (new Set(values).size < 2) {
    errorEl.textContent = 'Please enter at least 2 different stations.';
    return;
  }

  clearMap();

  const result = findBestMeetup(values);
  if (!result) {
    errorEl.textContent = 'Could not find a reachable meeting point.';
    return;
  }

  // Map
  values.forEach((s, i) => addFriendMarker(s, i));
  addMeetMarker(result.station);
  drawLines(values, result.station);

  const pts = [...values, result.station]
    .filter(s => STATIONS[s])
    .map(s => [STATIONS[s].lat, STATIONS[s].lng]);
  if (pts.length > 0) map.fitBounds(pts, { padding: [40, 40] });

  // Result panel
  document.getElementById('resultStation').textContent = result.station;
  document.getElementById('resultMeta').textContent =
    `Max ${result.maxStops} stop${result.maxStops !== 1 ? 's' : ''} from any friend`;

  const grid = document.getElementById('breakdownGrid');
  grid.innerHTML = '';
  const maxVal = Math.max(...result.stops);

  values.forEach((s, i) => {
    const c = FRIEND_COLORS[i];
    const stops = result.stops[i];
    const pct = maxVal > 0 ? Math.round((stops / maxVal) * 100) : 100;

    const card = document.createElement('div');
    card.className = 'breakdown-card';
    card.style.setProperty('--card-color', c.bg);
    card.querySelector || (card.innerHTML = '');
    card.innerHTML = `
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c.bg}"></div>
      <div class="breakdown-friend">Friend ${i+1}</div>
      <div class="breakdown-from">${s}</div>
      <div class="breakdown-stops" style="color:${c.bg}">${stops}</div>
      <div class="breakdown-label">stop${stops !== 1 ? 's' : ''}</div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pct}%;background:${c.bg}"></div>
      </div>
    `;
    grid.appendChild(card);
  });

  const totalStops = result.stops.reduce((a,b)=>a+b,0);
  const avg = (totalStops / result.stops.length).toFixed(1);
  const stddev = Math.sqrt(result.variance).toFixed(1);

  document.getElementById('scoreRow').innerHTML = `
    <div class="score-item">
      <div class="score-label">Max Stops</div>
      <div class="score-value">${result.maxStops}</div>
    </div>
    <div class="score-item">
      <div class="score-label">Total Stops</div>
      <div class="score-value">${totalStops}</div>
    </div>
    <div class="score-item">
      <div class="score-label">Avg Stops</div>
      <div class="score-value">${avg}</div>
    </div>
    <div class="score-item">
      <div class="score-label">Std Dev</div>
      <div class="score-value">${stddev}</div>
    </div>
  `;

  document.getElementById('resultPanel').classList.add('visible');
}
